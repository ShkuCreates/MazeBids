services:
  - type: web
    name: mazebids-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma migrate deploy && npm run build
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_REDIRECT_URI
        value: https://api.mazebids.online/api/auth/discord/callback
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_DISCORD_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://mazebids.online

  - type: web
    name: mazebids-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://api.mazebids.online


